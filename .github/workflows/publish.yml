name: Publish to Maven Central

on:
  push:
    tags: ['v*']

jobs:
  publish:
    # macOS runner so we can cross-compile the Rust QuickJS libs for iOS
    # targets (Xcode + iOS SDK are required) and build Kotlin/Native iOS
    # targets in the same job.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Rust with iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/rust/target
          key: ${{ runner.os }}-cargo-ios-${{ hashFiles('native/rust/Cargo.lock', 'native/rust/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ios-

      - name: Build Rust iOS static libraries
        run: bash native/rust/build_ios.sh

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_TOKEN }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew :onthefly-engine:publishToMavenCentral -PVERSION_NAME=${{ steps.version.outputs.value }} --no-configuration-cache
